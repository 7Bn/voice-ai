# Voice AI Receptionist — local development + production stack
#
# Services:
#   db       — PostgreSQL 15 (HIPAA-eligible in prod: use RDS with encryption at rest)
#   api      — FastAPI server (Twilio webhooks, internal endpoints)
#   worker   — LiveKit agent worker (one process per concurrent call, auto-scales)
#   migrate  — Alembic migration runner (runs once at deploy, then exits)
#
# Usage:
#   Start everything:         docker compose up
#   Run migrations only:      docker compose run --rm migrate
#   Tail API logs:            docker compose logs -f api
#   Provision a practice:     docker compose run --rm api python -m app.cli provision-practice ...
#   Run tests:                docker compose run --rm api python -m pytest

version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voice_ai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: voice_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice_ai"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voice_ai:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/voice_ai
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voice_ai:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/voice_ai
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    command: python -m app.agent.receptionist
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voice_ai:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/voice_ai
    depends_on:
      api:
        condition: service_healthy
    # Scale workers for concurrent calls: docker compose up --scale worker=4
    # Each worker handles one call at a time (LiveKit job model)

volumes:
  postgres_data:
